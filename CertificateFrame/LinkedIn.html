<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacOS Dark Mode Iframe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .mac-window {
            width: 1000px;
            height: 600px;
            background: #2d2d2d;
            border-radius: 12px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #444;
        }

        .mac-titlebar {
            background: #3a3a3a;
            height: 35px;
            display: flex;
            align-items: center;
            padding-left: 14px;
            border-bottom: 1px solid #444;
        }

        .buttons {
            display: flex;
            gap: 8px;
        }

        .button {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            transition: transform 0.2s ease-in-out;
        }

        .button:hover {
            transform: scale(1.2);
        }

        .red { background: #ff5f56; box-shadow: 0 0 5px #ff5f56; }
        .yellow { background: #ffbd2e; box-shadow: 0 0 5px #ffbd2e; }
        .green { background: #27c93f; box-shadow: 0 0 5px #27c93f; }

        iframe {
            width: 100%;
            height: calc(100% - 35px);
            border: none;
            background: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="mac-window">
        <div class="mac-titlebar">
            <div class="buttons">
                <span class="button red"></span>
                <span class="button yellow"></span>
                <span class="button green"></span>
            </div>
        </div>
        <iframe src="Tally ERP9 With GST Step By Step Guide From Basic to Advance.pdf"></iframe>
    </div>

</body>
</html>
